<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>岫老師數位大腦 V9.1 完全體</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="https://api.iconify.design/fluent-emoji:rocket.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="https://api.iconify.design/fluent-emoji:rocket.svg">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --danger: #ef4444; --success: #2ecc71; --orange: #f1c40f; }
        body { background: var(--bg); color: var(--text); padding: 15px; font-family: sans-serif; margin: 0; min-height: 100vh; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #15171e; padding: 10px; border-radius: 8px; border: 1px solid #1e293b; }
        .key-badge { background: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; }
        
        .trend-box-toggle { width: 100%; background: #232d42; color: var(--orange); padding: 10px; border-radius: 8px; border: 1px solid #334155; font-weight: bold; font-size: 13px; margin-bottom: 10px; text-align: center; cursor: pointer; }
        .trend-panel { background: #15171e; border: 1px solid #2d313f; border-radius: 8px; padding: 12px; margin-bottom: 15px; display: none; }
        .trend-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        @media (min-width: 768px) { .trend-grid { grid-template-columns: 1fr 1fr; } }
        .trend-btn { background: #2d313f; padding: 10px; border-radius: 6px; font-size: 13px; cursor: pointer; border-left: 4px solid var(--orange); text-align: left; color: var(--text); line-height: 1.4; }
        .trend-btn:hover { background: #353a4a; }

        textarea { width: 100%; height: 320px; background: var(--card); color: #fff; padding: 15px; border-radius: 12px; border: 2px solid #334155; box-sizing: border-box; font-size: 16px; outline: none; line-height: 1.6; resize: none; -webkit-appearance: none; }
        .header-label { font-size: 13px; color: #94a3b8; margin: 12px 0 6px 0; display: flex; justify-content: space-between; align-items: center; }
        .list-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
        .item-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; border: 1px solid transparent; background: #334155; color: #94a3b8; }
        .tag-btn { border-color: #475569; }
        .tag-btn.active { border-color: white; color: white; font-weight: bold; }
        .btn-add { background: none; border: 1px dashed var(--accent); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        button { padding: 12px 5px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; -webkit-appearance: none; }
        .btn-clear { background: var(--danger); color: white; }
        .btn-save { background: #475569; color: white; }
        .btn-copy { background: var(--accent); color: #0f172a; }
        
        .history-card { background: var(--card); border-left: 5px solid #475569; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #334155; border-left-width: 5px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .history-tag { padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; }
        .history-time { font-size: 11px; color: #64748b; }
        .history-content { font-size: 15px; color: #cbd5e1; white-space: pre-wrap; word-break: break-all; max-height: 90px; overflow: hidden; transition: max-height 0.3s ease-out; line-height: 1.6; }
        
        /* 🟢 輸出面板升級 */
        .output-zone { background: #15171e; border: 2px solid var(--success); border-radius: 12px; padding: 15px; margin-top: 30px; display: none; }
        .output-textarea { width:100%; height: 250px; background:#000; color:var(--success); font-family: monospace; font-size:14px; margin-top:10px; border: 1px solid #27ae60; padding: 10px; }
        .btn-final-copy { background: var(--success); color: #000; width: 100%; margin-top: 10px; padding: 12px; font-weight: bold; border-radius: 6px; font-size: 15px; }
        .btn-final-copy:disabled { background: #2c3e50; color: #7f8c8d; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h3 style="margin: 0; font-size: 1.1em; color: var(--accent);">🚀 岫老師數位大腦 V9.1 完全體</h3>
        <div><span id="keyStatus" class="key-badge" onclick="resetApiKey()">🔒 金鑰未設定</span></div>
    </div>

    <div class="trend-box-toggle" onclick="toggleTrendPanel()">📡 開啟/關閉：每日熱搜靈感盒</div>
    <div class="trend-panel" id="trendPanel">
        <div class="trend-grid" id="trendList">
            <span style="font-size:12px; color:#64748b;">🔑 請先設定右上角金鑰通行證，解鎖動態情報。</span>
        </div>
    </div>

    <div class="header-label"><span>📂 分類 (點擊切換/右鍵刪除)</span><button class="btn-add" onclick="addTag()">+ 新增分類</button></div>
    <div class="list-container" id="tagList"></div>

    <div class="header-label"><span>⚡ 快捷 (點擊插入/右鍵刪除)</span><button class="btn-add" onclick="addPhrase()">+ 新增指令</button></div>
    <div class="list-container" id="phraseList"></div>

    <textarea id="draft" placeholder="在此直接用語音打字倒進您的靈感或點評..."></textarea>
    <div id="status" style="text-align:center; font-size:12px; color:#38bdf8; height:20px; margin:5px 0; font-weight:bold;"></div>

    <div class="controls">
        <button class="btn-clear" onclick="archiveAndClear()">歸檔並清空</button>
        <button class="btn-save" onclick="manualSave()">儲存草稿</button>
        <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">📋 複製全文</button>
    </div>

    <div class="output-zone" id="outputZone">
        <h4 style="color:var(--success); margin:0 0 10px 0;">🟢 助手 B 複驗通過：100% 乾淨完整 HTML 網網頁程式碼</h4>
        <textarea id="finalHtmlOutput" class="output-textarea" readonly></textarea>
        <button id="finalCopyBtn" class="btn-final-copy" onclick="copyFinalCode()" disabled>❌ 施工中，請稍候...</button>
    </div>

    <div class="history-section">
        <h4 style="margin:25px 0 10px 0; color:var(--accent);">📜 個人事業知識庫</h4>
        <div id="historyList"></div>
    </div>

    <div style="margin-top:40px; padding:15px; border-top:1px dashed #334155; display:flex; gap:10px;">
        <button style="background:#334155; color:white; font-size:11px; padding:8px; flex:1;" onclick="exportData()">💾 匯出整包備份 (.json)</button>
        <button style="background:#334155; color:white; font-size:11px; padding:8px; flex:1;" onclick="document.getElementById('importFile').click()">📥 匯入備份檔案</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

<script>
    let GEMINI_API_KEY = ""; let activeTagName = "一般";
    let isGenerationComplete = false; // 🔒 防呆鎖旗標
    const draftArea = document.getElementById('draft');
    const outputZone = document.getElementById('outputZone');
    const outputArea = document.getElementById('finalHtmlOutput');
    const finalCopyBtn = document.getElementById('finalCopyBtn');

    window.onload = () => {
        draftArea.value = localStorage.getItem('xiu_draft_v7') || "";
        if (!draftArea.value) addDateStamp();
        const savedKey = localStorage.getItem('xiu_secret_key');
        if (savedKey) {
            GEMINI_API_KEY = savedKey;
            document.getElementById('keyStatus').innerText = "🔓 已就位";
            document.getElementById('keyStatus').style.background = "#2ecc71";
            refreshDailyTrends();
        }
        renderTags(); renderPhrases(); renderHistory();
    };

    function promptForApiKey() {
        const key = prompt("請貼入您的 Google Gemini API 金鑰（AIzaSy 開頭）：");
        if (key) { localStorage.setItem('xiu_secret_key', key); location.reload(); }
    }
    function resetApiKey() { if(confirm("確定要重設金鑰嗎？")) { localStorage.removeItem('xiu_secret_key'); location.reload(); } }

    function toggleTrendPanel() {
        const p = document.getElementById('trendPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    async function refreshDailyTrends() {
        if(!GEMINI_API_KEY) return;
        const listContainer = document.getElementById('trendList');
        const trendPrompt = `請檢索 2026 年台灣搜尋引擎熱門關鍵字，直接以 JSON 字串陣列格式返回 6 個關於「台灣黑心加盟陷阱」、「民生資安釣魚簡訊」、「裝潢工種施工衝突不准」、「中小企業轉型受騙」這四大領域中最具大眾痛點的話題標題。不要包含 markdown 標籤。`;
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: trendPrompt }] }], generationConfig: { responseMimeType: "application/json", temperature: 0.4 } })
            });
            const data = await response.json();
            const trends = JSON.parse(data.candidates[0].content.parts[0].text);
            listContainer.innerHTML = "";
            trends.forEach(topic => {
                listContainer.innerHTML += `<div class="trend-btn" onclick="selectTrend('${topic}')">🔥 ${topic}</div>`;
            });
        } catch (e) {
            listContainer.innerHTML = `<div class="trend-btn" onclick="selectTrend('台灣黑心加盟體系合約陷阱拆解')">🔥 1. 黑心加盟合約陷阱</div>`;
        }
    }

    function selectTrend(topic) {
        const cleanVal = draftArea.value.replace(/^【選定熱搜話題：.*】\n/, "");
        draftArea.value = `【選定熱搜話題：${topic}】\n` + cleanVal;
        toggleTrendPanel();
        draftArea.focus();
        showStatus("🎯 靈感話題已鎖死至第一行！");
    }

    async function runAssistantFlow(index) {
        if(!GEMINI_API_KEY) { alert("請先配置金鑰權限！"); promptForApiKey(); return; }
        let history = JSON.parse(localStorage.getItem('xiu_history_v7') || "[]");
        const cardContent = history[index].text;

        // 🔒 初始化發動，鎖死複製鈕，防止空轉複製
        isGenerationComplete = false;
        finalCopyBtn.disabled = true;
        finalCopyBtn.innerText = "❌ 助手正在重裝放樣中，請稍候...";
        outputZone.style.display = "block";
        outputArea.value = `⏳ 助手二三正在進行 1500 字細節不刪減擴寫中...出來的網頁會自帶純白清爽對撞圖卡與中英分流、首尾雙返回鍵。`;
        window.scrollTo({ top: outputZone.offsetTop, behavior: 'smooth' });

        const systemInstruction = `你現在是 24hr-168.com 後台系統。1. 擴寫1500字物超所值，保留所有黑話、技術細節（如退縮尺寸、301跳轉）。2. 頂部刻出清爽雙欄文青圖卡，左珊瑚紅坑，右草本綠正確解法。3. 中英整篇分流，頂部與頁尾內建返回 index.html 雙按鍵。涉及生命里程碑統一用公允詞彙。只返回乾淨 HTML。不要包含 markdown 標籤。`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: systemInstruction + "\n\n素材內容：\n" + cardContent }] }], generationConfig: { maxOutputTokens: 8192, temperature: 0.25 } })
            });
            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                let finalHtml = data.candidates[0].content.parts[0].text;
                finalHtml = finalHtml.replace(/```html/g, "").replace(/```/g, "").trim();
                
                // 🟢 成功合龍：解鎖按鈕
                outputArea.value = finalHtml;
                isGenerationComplete = true;
                finalCopyBtn.disabled = false;
                finalCopyBtn.innerText = "📋 複製最終成文網頁 HTML";
                document.getElementById('status').innerText = "🟢 助手成文完成！防呆鎖已解開！";
            } else { throw new Error("遠端大腦未及時返回數據。"); }
        } catch (error) { 
            outputArea.value = `❌ 連線超時或錯誤：${error.message}\n提示：請確認您的網路狀況，或點擊上方「🔓 已就位」重設金鑰。`; 
            finalCopyBtn.innerText = "❌ 施工崩塌，無法複製";
        }
    }

    function executeMobileCopy(text) {
        const ta = document.createElement('textarea'); ta.value = text;
        ta.style.position = 'fixed'; ta.style.left = '-9999px'; document.body.appendChild(ta); ta.focus(); ta.select();
        const success = document.execCommand('copy'); document.body.removeChild(ta); return success;
    }

    function copyToClipboard() { if (executeMobileCopy(draftArea.value)) { showStatus("🎉 複製草稿成功！"); } }
    function copyHistory(index) { let history = JSON.parse(localStorage.getItem('xiu_history_v7') || "[]"); if (executeMobileCopy(history[index].text)) { showStatus("✅ 小卡內容已複製！"); } }
    
    function copyFinalCode() {
        if (!isGenerationComplete) { alert("🚨 報告岫老師！大腦還在施工中，不准偷步複製模板！"); return; }
        if (executeMobileCopy(outputArea.value)) { alert("📋 1500字最終成文 HTML 複製成功！"); }
    }

    function toggleExpand(index) {
        const contentDiv = document.getElementById(`content-${index}`);
        if (contentDiv.style.maxHeight === 'none') { contentDiv.style.maxHeight = '90px'; }
        else { contentDiv.style.maxHeight = 'none'; }
    }

    function getTags() { return JSON.parse(localStorage.getItem('xiu_custom_tags')) || [{name:"一般", color:"#475569"},{name:"SEO計畫", color:"#10b981"},{name:"工程技術", color:"#f59e0b"}]; }
    function renderTags() {
        const tags = getTags(); const tagList = document.getElementById('tagList');
        tagList.innerHTML = tags.map(t => `<div class="item-btn tag-btn ${t.name === activeTagName ? 'active' : ''}" style="background: ${t.name === activeTagName ? t.color : '#334155'}; border-color: ${t.color}" onclick="setActiveTag('${t.name}')" oncontextmenu="removeTag('${t.name}'); return false;">#${t.name}</div>`).join('');
    }
    function setActiveTag(n) { activeTagName = n; renderTags(); }
    function addTag() { 
        const n = prompt("分類名稱:"); const c = prompt("顏色:", "#38bdf8");
        if(n && c) { let t = getTags(); t.push({name:n, color:c}); localStorage.setItem('xiu_custom_tags', JSON.stringify(t)); renderTags(); }
    }
    function removeTag(n) { if(n!=="一般" && confirm(`刪除 #${n}？`)) { let t = getTags().filter(x=>x.name!==n); localStorage.setItem('xiu_custom_tags', JSON.stringify(t)); if(activeTagName===n) activeTagName="一般"; renderTags(); } }

    function archiveAndClear() {
        const content = draftArea.value; if(content.replace(/【時間：.*】/, "").trim().length === 0) return;
        const currentTagObj = getTags().find(t => t.name === activeTagName) || {name: "一般", color: "#475569"};
        if (confirm(`確認將此段原稿歸檔進 [#${activeTagName}]？`)) {
            let history = JSON.parse(localStorage.getItem('xiu_history_v7') || "[]");
            history.unshift({ time: new Date().toLocaleString(), tag: activeTagName, color: currentTagObj.color, text: content });
            localStorage.setItem('xiu_history_v7', JSON.stringify(history.slice(0, 100)));
            draftArea.value = ""; addDateStamp(); renderHistory(); showStatus("✅ 成功歸檔");
        }
    }

    function renderHistory() {
        let history = JSON.parse(localStorage.getItem('xiu_history_v7') || "[]");
        document.getElementById('historyList').innerHTML = history.map((item, index) => `
            <div class="history-card" style="border-left-color: ${item.color}">
                <div class="history-header"><span class="history-tag" style="background:${item.color}">${item.tag}</span><span class="history-time">${item.time}</span></div>
                <div class="history-content" id="content-${index}">${item.text}</div>
                <div style="margin-top:12px;">
                    <button style="background:#334155; color:white; padding:6px 12px; border-radius:4px; border:none;" onclick="toggleExpand(${index})">🔍 展開/收合</button>
                    <button style="background:#475569; color:white; padding:6px 12px; border-radius:4px; margin-left:5px; border:none;" onclick="copyHistory(${index})">📋 複製素材</button>
                    <button style="background:var(--accent); color:#0f172a; padding:6px 14px; border-radius:4px; margin-left:5px; border:none; font-weight:bold;" onclick="runAssistantFlow(${index})">🚀 叫助手成文 HTML</button>
                    <button style="background:none; color:#ef4444; margin-left:15px; border:none;" onclick="deleteHistory(${index})">🗑️ 刪除</button>
                </div>
            </div>
        `).join('');
    }

    // 餘下數據備份保持原樣
    function exportData() {
        const fullData = { draft: localStorage.getItem('xiu_draft_v7'), history: localStorage.getItem('xiu_history_v7'), tags: localStorage.getItem('xiu_custom_tags'), phrases: localStorage.getItem('xiu_phrases_v7') };
        const blob = new Blob([JSON.stringify(fullData)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `岫老師大腦備份_${new Date().toLocaleDateString()}.json`; a.click();
    }
    function importData(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if(confirm("確定要導入此備份包嗎？")) {
                    if(data.draft) localStorage.setItem('xiu_draft_v7', data.draft);
                    if(data.history) localStorage.setItem('xiu_history_v7', data.history);
                    if(data.tags) localStorage.setItem('xiu_custom_tags', data.tags);
                    if(data.phrases) localStorage.setItem('xiu_phrases_v7', data.phrases);
                    location.reload();
                }
            } catch(err) { alert("檔案不正確！"); }
        };
        reader.readAsText(file);
    }
    function renderPhrases() {
        const p = JSON.parse(localStorage.getItem('xiu_phrases_v7') || '[{"label":"求分析","text":"請分析："},{"label":"查LISP","text":"檢查LISP："}]');
        document.getElementById('phraseList').innerHTML = p.map((x, i) => `<div class="item-btn" style="border-color:var(--accent); color:var(--accent);" onclick="insertText('${x.text}')" oncontextmenu="removePhrase(${i}); return false;">${x.label}</div>`).join('');
    }
    function addPhrase() { const l = prompt("指令名稱:"); const t = prompt("指令內容:"); if(l && t) { let p = JSON.parse(localStorage.getItem('xiu_phrases_v7') || "[]"); p.push({label:l, text:t}); localStorage.setItem('xiu_phrases_v7', JSON.stringify(p)); renderPhrases(); } }
    function removePhrase(i) { if(confirm("刪除指令？")) { let p = JSON.parse(localStorage.getItem('xiu_phrases_v7') || "[]"); p.splice(i, 1); localStorage.setItem('xiu_phrases_v7', JSON.stringify(p)); renderPhrases(); } }
    function insertText(t) { const s = draftArea.selectionStart; draftArea.value = draftArea.value.substring(0, s) + t + draftArea.value.substring(draftArea.selectionEnd); draftArea.focus(); draftArea.selectionStart = draftArea.selectionEnd = s + t.length; }
    function deleteHistory(i) { if(confirm("確定刪除？")) { let h = JSON.parse(localStorage.getItem('xiu_history_v7') || "[]"); h.splice(i, 1); localStorage.setItem('xiu_history_v7', JSON.stringify(h)); renderHistory(); } }
    function addDateStamp() { draftArea.value = `【時間：${new Date().toLocaleString()}】\n`; }
    setInterval(() => { localStorage.setItem('xiu_draft_v7', draftArea.value); }, 2000);
    function manualSave() { localStorage.setItem('xiu_draft_v7', draftArea.value); showStatus("💾 草稿已安全鎖死"); }
    function showStatus(m) { document.getElementById('status').innerText = m; setTimeout(() => { document.getElementById('status').innerText = ""; }, 3000); }
</script>
</body>
</html>
