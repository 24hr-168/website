<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24hr-168.com - 多模態地下控制台</title>
    <style>
        :root { --bg-color: #1a1c23; --panel-bg: #222531; --sidebar-bg: #15171e; --text-color: #e2e4e9; --accent-blue: #4d7cff; --accent-green: #2ecc71; --accent-orange: #f1c40f; --text-muted: #8a8f98; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .workspace-container { display: flex; flex: 1; flex-direction: column; height: calc(100vh - 60px); }
        @media (min-width: 992px) { .workspace-container { flex-direction: row; } }
        .sidebar-trend { background-color: var(--sidebar-bg); padding: 15px; border-bottom: 1px solid #2d313f; overflow-y: auto; }
        @media (min-width: 992px) { .sidebar-trend { width: 320px; border-bottom: none; border-right: 1px solid #2d313f; } }
        .trend-item { background: #2d313f; padding: 12px; border-radius: 6px; margin-bottom: 8px; font-size: 14px; cursor: pointer; border-left: 4px solid var(--accent-orange); transition: transform 0.2s; line-height: 1.4; }
        .trend-item:hover { transform: translateX(4px); background: #353a4a; }
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; overflow-y: auto; }
        .panel-group { display: flex; flex-direction: column; gap: 15px; flex: 1; }
        @media (min-width: 768px) { .panel-group { flex-direction: row; } }
        .text-panel { flex: 1; background-color: var(--panel-bg); border-radius: 8px; padding: 15px; border: 1px solid #2d313f; display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; flex: 1; min-height: 200px; background: #15171e; color: var(--text-color); border: 1px solid #2d313f; border-radius: 6px; padding: 12px; font-size: 16px; line-height: 1.6; resize: none; }
        
        /* 📱 岫老師專屬：重裝多模態媒體控制列 */
        .media-upload-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #15171e;
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed #2d313f;
            align-items: center;
        }
        .file-label {
            background: #353a4a;
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .file-label:hover { background: var(--accent-blue); }
        .file-input { display: none; }
        .preview-badge {
            font-size: 12px;
            background: #2d313f;
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--accent-orange);
            display: none;
        }

        .btn-action { background-color: var(--accent-blue); color: white; border: none; padding: 14px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; width: 100%; }
        .status-box { background: #15171e; padding: 12px; border-radius: 6px; font-size: 13px; border-left: 4px solid var(--accent-blue); display: none; line-height: 1.6; }
        .key-badge { background: #2ecc71; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; display: inline-block; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div style="background:#15171e; padding: 15px; border-bottom: 1px solid #2d313f; display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--accent-blue); font-size:1.2em; margin:0;">😎 24hr-168.com 多模態控制台</h2>
        <div>
            <span id="keyStatus" class="key-badge" onclick="resetApiKey()">🔒 鑰匙未設定</span>
        </div>
    </div>

    <div class="workspace-container">
        <div class="sidebar-trend">
            <h4 style="color: var(--accent-orange); margin-bottom: 5px;">📡 每日熱搜靈感盒</h4>
            <span style="font-size: 11px; color: var(--text-muted);">正在讀取本地端金鑰...</span>
            <hr style="border-color:#2d313f; margin: 10px 0;">
        </div>

        <div class="main-content">
            <div class="panel-group">
                <div class="text-panel">
                    <h4 id="currentTopic" style="color:var(--accent-orange);">🎯 選定話題：請選擇靈感話題</h4>
                    
                    <div class="media-upload-bar">
                        <label class="file-label">
                            📁 📥 丟入工地現場圖 / 上傳照片
                            <input type="file" id="imageInput" class="file-input" accept="image/*" onchange="handleFileSelect('image')">
                        </label>
                        <label class="file-label" style="background:#27ae60;">
                            🎙️ 📥 導入點評音檔 / 錄音檔
                            <input type="file" id="audioInput" class="file-input" accept="audio/*,video/mp4" onchange="handleFileSelect('audio')">
                        </label>
                        <span id="imageBadge" class="preview-badge">🖼️ 照片已就位</span>
                        <span id="audioBadge" class="preview-badge">🎵 音檔已鎖死</span>
                    </div>

                    <textarea id="xiuOpinion" placeholder="選定話題後，可以直接配合上方按鈕導入錄音檔或工地現場照。若想補充，也可在此直接敲入文字點評...字體即時自動鎖死！"></textarea>
                    <button class="btn-action" onclick="runGeminiFlow()">🚀 發動助手群：硬核續寫 ＋ 複驗審查</button>
                    <div class="status-box" id="statusBox"></div>
                </div>

                <div class="text-panel">
                    <h4 style="color:var(--accent-green);">🟢 助手 B 複驗通過：100% 乾淨完整 HTML 程式碼</h4>
                    <textarea id="finalHtmlOutput" readonly placeholder="等待後台多模態核心進行大數據擴寫...出來的代碼自帶純網頁中英分流、頂部導航與結構網頁圖卡。"></textarea>
                    <button class="btn-action" style="background-color:var(--accent-green);" onclick="copyCode()">📋 一鍵複製成文代碼</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let GEMINI_API_KEY = "";
        let base64Image = "";
        let imageMimeType = "";
        let base64Audio = "";
        let audioMimeType = "";

        const inputArea = document.getElementById('xiuOpinion');
        const statusBox = document.getElementById('statusBox');
        const outputArea = document.getElementById('finalHtmlOutput');

        // 🔒 初始化與金鑰隱形鎖
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('xiu_secret_key');
            if (savedKey) {
                GEMINI_API_KEY = savedKey;
                document.getElementById('keyStatus').innerText = "🔓 鑰匙已就位";
                document.getElementById('keyStatus').style.background = "#2ecc71";
                refreshDailyTrends();
            } else {
                promptForApiKey();
            }
            const savedDraft = localStorage.getItem('xiu_mobile_draft');
            if (savedDraft) { inputArea.value = savedDraft; }
        });

        function promptForApiKey() {
            const key = prompt("岫老師，請貼入您專屬的 Google Gemini API 金鑰（以 AIzaSy 開頭）：");
            if (key) {
                localStorage.setItem('xiu_secret_key', key);
                GEMINI_API_KEY = key;
                location.reload();
            }
        }

        function resetApiKey() {
            if(confirm("確定要重設並清除這台裝置裏的 API 金鑰通行證嗎？")) {
                localStorage.removeItem('xiu_secret_key');
                location.reload();
            }
        }

        // 🖼️ 🎙️ 處理手機端多模態檔案輸入，即時轉換為二進位 Base64 數據流
        function handleFileSelect(type) {
            const fileInput = type === 'image' ? document.getElementById('imageInput') : document.getElementById('audioInput');
            const badge = type === 'image' ? document.getElementById('imageBadge') : document.getElementById('audioBadge');
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1];
                if (type === 'image') {
                    base64Image = base64Data;
                    imageMimeType = file.type;
                    badge.style.display = 'inline-block';
                } else {
                    base64Audio = base64Data;
                    audioMimeType = file.type || "audio/mp3"; // 防止某些手機瀏覽器丟失 mimeType
                    badge.style.display = 'inline-block';
                }
            };
            reader.readAsDataURL(file);
        }

        // 📡 助手 C 動態趨勢雷達
        async function refreshDailyTrends() {
            if(!GEMINI_API_KEY) return;
            const trendContainer = document.querySelector('.sidebar-trend');
            trendContainer.innerHTML = `<h4 style="color:var(--accent-orange);">📡 每日熱搜靈感盒</h4><span style="font-size:12px; color:var(--text-muted);">⏳ 每日全網雷達掃描最新流量密碼...</span><hr style="border-color:#2d313f; margin: 10px 0;">`;
            const trendPrompt = `你現在是 24hr-168.com 的趨勢情報官。請檢索 2026 年台灣熱門搜尋，直接以 JSON 字串陣列格式返回 8 個關於「台灣黑心加盟陷阱」、「民生資安釣魚警訊」、「裝潢工種施工衝突不准」、「中小企業轉型受騙」這四大領域中最具大眾痛點、搜尋量最高的話題。不要包含 markdown 標籤，只要乾淨的 JSON 陣列如 ["標題1", "標題2"]。`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: trendPrompt }] }],
                        generationConfig: { responseMimeType: "application/json", temperature: 0.4 }
                    })
                });
                const data = await response.json();
                const trends = JSON.parse(data.candidates[0].content.parts[0].text);
                trendContainer.innerHTML = `<h4 style="color: var(--accent-orange); margin-bottom: 5px;">📡 每日熱搜靈感盒</h4><span style="font-size: 11px; color: var(--text-muted);">雷達動態翻新：點擊自動套入</span><hr style="border-color:#2d313f; margin: 10px 0;">`;
                trends.forEach((topic, index) => {
                    trendContainer.innerHTML += `<div class="trend-item" onclick="selectTrend('${topic}')">🔥 ${index + 1}. ${topic}</div>`;
                });
            } catch (e) {
                trendContainer.innerHTML = `<h4 style="color: var(--accent-orange);">📡 每日熱搜靈感盒</h4><span style="color:#e74c3c; font-size:12px;">網上連線受阻，使用預備骨架中...</span><hr style="border-color:#2d313f; margin: 10px 0;"><div class="trend-item" onclick="selectTrend('台灣黑心加盟體系合約陷阱拆解')">🔥 1. 黑心加盟合約陷阱</div><div class="trend-item" onclick="selectTrend('最新公用事業催繳釣魚簡訊防線')">🔥 2. 民生催繳釣魚簡訊防線</div>`;
            }
        }

        function selectTrend(topic) {
            document.getElementById('currentTopic').innerText = `🎯 當前靈感：${topic}`;
            inputArea.value = `對於【${topic}】，我幾十年老手的實戰看法是：\n`;
            inputArea.focus();
        }

        inputArea.addEventListener('input', () => { localStorage.setItem('xiu_mobile_draft', inputArea.value); });

        // 🧠 多模態核心：直連進階大腦，發動多智慧體協同
        async function runGeminiFlow() {
            if(!GEMINI_API_KEY) { alert("請先設定金鑰！"); promptForApiKey(); return; }
            const xiuInput = inputArea.value;
            if(!xiuInput && !base64Image && !base64Audio) { alert("請提供文字點評、照片或音檔其中之一！"); return; }

            statusBox.style.display = "block";
            statusBox.innerHTML = `🧠 <b>[多模態解碼中]</b> 正在將語音音檔或工地現場照片轉化為二進位數據流，直連進階大腦接口...`;

            // 🎯 岫老師專屬：重裝注入清爽文青視覺、坑與正確解法正面碰撞、以及頁首頁尾 index.html 雙返回鍵之死命令指令
            const systemInstruction = `
            你現在是 24hr-168.com 數位診斷室網站的後台多智慧體協同系統。
            如果你收到了語音音檔或錄音，請立刻聽取語音內容；如果你收到了現場照片，請嚴格核對照片細節。將這些多模態素材與岫老師提供的文字原稿融合，執行以下死命令：
            
            1. 助手 A (硬核續寫員)：進行深度擴寫，口吻必須一本正經、犀利、扒光底細、專治不服。
               【鐵律】越到專業的現場工法、技術細節、黑話、資安代碼或商戰內幕（如：退縮尺寸、KK狗狗、301Redirect、消失的800元、CVV代碼、時間戳記），越要百分之百完整保留並進行詳細細化！絕對禁止自行精簡、刪除、模糊化或概括任何專業細節！字數必須紮實飽滿衝破 1500 字，絕不准說空話。
               【文章對話邏輯】內文必須嚴格包含四大鋼鐵框架要素：【爆款引子（直擊痛點大眾盲區）】➔【核心深化（轉化用戶思想素材）】➔【避坑與一秒防呆指南細節（文章核心功能）】➔【大眾公允結尾（行動建議）】。
            
            2. 網頁放樣師：在文章最開頭，自動用 HTML 和純 CSS 刻出一個『極致清爽文青美學』的結構化摘要對比圖卡區 (.infographic-box)。
               【清爽排版規格】整體背景必須為純白或極淡灰 (#ffffff 或 #f9f9f9)，文字為深炭灰 (#2c3e50)。留白寬裕，嚴禁使用任何晃來晃去的大面積色塊背景打擾閱讀。
               【碰撞圖卡邏輯】對照區不再用背景底色，改用極細、優雅的淺灰邊框 (#e2e8f0) 畫出俐落乾淨的雙欄。這不是非黑即白的詐騙，而是觀點碰撞：
                 - 左欄為【❌ 文章內寫的坑 / 常見迷思 / 認知盲點】：文字點綴為細緻的珊瑚紅 (#e74c3c) 並加粗，列出 3 個該話題大眾常犯錯誤。
                 - 右欄為【🟢 文章內提供的正確解法 / 專業防呆 / 行動對策】：文字點綴為安靜的草本綠 (#27ae60) 並加粗，針鋒相對條列相應解法。
                 文字要像 24hr-168 網站一樣精煉、一目了然，讓人一看就明白文章重點整理。
            
            3. 助手 B (審閱官)：嚴格校正繁簡錯別字，確保全面使用台灣習慣的專業用語。
               【排版鐵律】文章必須採用「中英整篇前後分流（繁體中文全篇在上，高級商務英文全篇在下）」的絕對閉合布局。
               【導航與返回鐵律】
                 - 出來的網頁頂部導航列 (<header>)：右側必須包含連結回主頁的 <a href="index.html"> 返回首頁 </a> 與指向下半部英文區的內頁錨點跳轉按鍵 <a href="#en"> English Version </a>（配合英文版開頭帶有 id="en" 屬性）。
                 - 出來的網頁底部頁尾 (<footer>)：必須再次完整包含一個乾淨的 <a href="index.html"> 返回首頁 </a>（頁尾返回鍵），方便拉到最底部的讀者一鍵回主頁 index。
               【用詞防呆】若話題或內容涉及重大生活/生命事件（如分娩、退休等），無論中英文，嚴禁偏向單一性別，統一改用『重要生命里程碑』（英文用 Major Life Milestones）等具普適性、大眾皆宜的專業公允標頭。
            
            一律只返回文章內部的乾淨 HTML 代碼。不要包含 Markdown 的 \`\`\`html 或 \`\`\` 標籤。
            `;

            // 🛠️ 封裝多模態 Payload
            let partsArray = [{ text: systemInstruction + "\n\n岫老師發出的第一手素材與看法引導：\n" + xiuInput }];
            
            if (base64Image) {
                partsArray.push({ inlineData: { mimeType: imageMimeType, data: base64Image } });
            }
            if (base64Audio) {
                partsArray.push({ inlineData: { mimeType: audioMimeType, data: base64Audio } });
            }

            try {
                // 🚀 2026 終極重裝：全面調用支援高級多模態與長上下文的最新 gemini-2.5-pro 模型，確保放樣精準
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: partsArray }],
                        generationConfig: { maxOutputTokens: 8192, temperature: 0.25 } // 降低隨機性，鎖死嚴格網頁骨架
                    })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let finalHtml = data.candidates[0].content.parts[0].text;
                    finalHtml = finalHtml.replace(/```html/g, "").replace(/```/g, "").trim();
                    
                    outputArea.value = finalHtml;
                    statusBox.innerHTML = `🟢 <b>多模態審查與細節驗收通過！</b> 1500字中英分流長文與清爽文青圖卡放樣完畢，已將您的語音精髓與現場照片細節完美扣死！`;
                    
                    // 清空多模態臨時變數與 Badge，等待下一次放樣
                    base64Image = ""; base64Audio = "";
                    document.getElementById('imageBadge').style.display = 'none';
                    document.getElementById('audioBadge').style.display = 'none';
                } else {
                    throw new Error("多模態解碼失敗，請確認檔案格式或金鑰額度。");
                }
            } catch (error) {
                statusBox.innerHTML = `<span style="color:#e74c3c;">❌ <b>多模態連線崩塌：</b> ${error.message}。請檢查網路，或重設金鑰。</span>`;
            }
        }

        function copyCode() { outputArea.select(); document.execCommand('copy'); alert('📋 最終 HTML 程式碼複製成功！請直接去 GitHub 貼上發布。'); }
    </script>
</body>
</html>
