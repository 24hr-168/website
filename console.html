<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24hr-168.com - 地下控制台</title>
    <style>
        :root { --bg-color: #1a1c23; --panel-bg: #222531; --sidebar-bg: #15171e; --text-color: #e2e4e9; --accent-blue: #4d7cff; --accent-green: #2ecc71; --accent-orange: #f1c40f; --text-muted: #8a8f98; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .workspace-container { display: flex; flex: 1; flex-direction: column; height: calc(100vh - 60px); }
        @media (min-width: 992px) { .workspace-container { flex-direction: row; } }
        .sidebar-trend { background-color: var(--sidebar-bg); padding: 15px; border-bottom: 1px solid #2d313f; overflow-y: auto; }
        @media (min-width: 992px) { .sidebar-trend { width: 300px; border-bottom: none; border-right: 1px solid #2d313f; } }
        .trend-item { background: #2d313f; padding: 12px; border-radius: 6px; margin-bottom: 8px; font-size: 14px; cursor: pointer; border-left: 4px solid var(--accent-orange); transition: transform 0.2s; }
        .trend-item:hover { transform: translateX(4px); background: #353a4a; }
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; overflow-y: auto; }
        .panel-group { display: flex; flex-direction: column; gap: 15px; flex: 1; }
        @media (min-width: 768px) { .panel-group { flex-direction: row; } }
        .text-panel { flex: 1; background-color: var(--panel-bg); border-radius: 8px; padding: 15px; border: 1px solid #2d313f; display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; flex: 1; min-height: 200px; background: #15171e; color: var(--text-color); border: 1px solid #2d313f; border-radius: 6px; padding: 12px; font-size: 16px; line-height: 1.6; resize: none; }
        .btn-action { background-color: var(--accent-blue); color: white; border: none; padding: 14px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; width: 100%; }
        .status-box { background: #15171e; padding: 12px; border-radius: 6px; font-size: 13px; border-left: 4px solid var(--accent-blue); display: none; line-height: 1.5; }
        .key-badge { background: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; display: inline-block; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div style="background:#15171e; padding: 15px; border-bottom: 1px solid #2d313f; display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--accent-blue); font-size:1.2em; margin:0;">😎 24hr-168.com 地下智慧體控制台 (手機電腦通吃版)</h2>
        <div>
            <span id="keyStatus" class="key-badge" onclick="resetApiKey()">🔒 鑰匙未設定</span>
        </div>
    </div>

    <div class="workspace-container">
        <div class="sidebar-trend">
            <h4 style="color: var(--accent-orange); margin-bottom: 5px;">📡 每日熱搜靈感盒</h4>
            <span style="font-size: 11px; color: var(--text-muted);">點擊話題自動套入</span>
            <hr style="border-color:#2d313f; margin: 10px 0;">
            <div class="trend-item" onclick="selectTrend('台灣黑心加盟體系合約陷阱拆解')">🔥 1. 黑心加盟合約陷阱</div>
            <div class="trend-item" onclick="selectTrend('最新公用事業催繳釣魚簡訊防線')">🔥 2. 民生催繳釣魚簡訊防線</div>
            <div class="trend-item" onclick="selectTrend('建案木作退縮尺寸與石材進出面衝突內幕')">🔥 3. 木作退縮與石材衝突</div>
            <div class="trend-item" onclick="selectTrend('中小企業數位轉型被軟體公司割韭菜現狀')">🔥 4. 數位轉型割韭菜盲點</div>
            <div class="trend-item" onclick="selectTrend('AI自動化SEO如何降維打擊傳統高價課程')">🔥 5. AI自動化SEO降維打擊</div>
        </div>

        <div class="main-content">
            <div class="panel-group">
                <div class="text-panel">
                    <h4 id="currentTopic" style="color:var(--accent-orange);">🎯 選定話題：請選擇靈感</h4>
                    <textarea id="xiuOpinion" placeholder="在工地或路上有空時，直接用手機或電腦在這一頓暴言點評..."></textarea>
                    <button class="btn-action" onclick="runGeminiFlow()">🚀 發動助手群：硬核續寫 ＋ 圖卡 ＋ 雙重審核</button>
                    <div class="status-box" id="statusBox"></div>
                </div>
                <div class="text-panel">
                    <h4 style="color:var(--accent-green);">🟢 助手 B 複驗通過：100% 乾淨 HTML 程式碼</h4>
                    <textarea id="finalHtmlOutput" readonly placeholder="審閱通過後的 HTML 代碼會在這裡吐出..."></textarea>
                    <button class="btn-action" style="background-color:var(--accent-green);" onclick="copyCode()">📋 一鍵複製成文代碼</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let GEMINI_API_KEY = "";
        const inputArea = document.getElementById('xiuOpinion');
        const statusBox = document.getElementById('statusBox');
        const outputArea = document.getElementById('finalHtmlOutput');

        // 🔒 隱形鎖初始化：讀取本地端記憶體
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('xiu_secret_key');
            if (savedKey) {
                GEMINI_API_KEY = savedKey;
                document.getElementById('keyStatus').innerText = "🔓 鑰匙已就位";
                document.getElementById('keyStatus').style.background = "#2ecc71";
            } else {
                promptForApiKey();
            }
            const savedDraft = localStorage.getItem('xiu_mobile_draft');
            if (savedDraft) { inputArea.value = savedDraft; }
        });

        function promptForApiKey() {
            const key = prompt("岫老師，請貼入您專屬的 Google Gemini API 金鑰（以 AIzaSy 開頭）：");
            if (key) {
                localStorage.setItem('xiu_secret_key', key);
                GEMINI_API_KEY = key;
                document.getElementById('keyStatus').innerText = "🔓 鑰匙已就位";
                document.getElementById('keyStatus').style.background = "#2ecc71";
                location.reload();
            }
        }

        function resetApiKey() {
            if(confirm("確定要重設並清除這台裝置裏的 API 金鑰通行證嗎？")) {
                localStorage.removeItem('xiu_secret_key');
                location.reload();
            }
        }

        function selectTrend(topic) {
            document.getElementById('currentTopic').innerText = `🎯 當前靈感：${topic}`;
            inputArea.value = `對於【${topic}】，我幾十年老手的實戰看法是：\n`;
            inputArea.focus();
        }

        // 📱 0.1秒即時鎖死草稿，手機電腦跨裝置接力
        inputArea.addEventListener('input', () => { localStorage.setItem('xiu_mobile_draft', inputArea.value); });

        // 🧠 核心：直連 Gemini API 呼叫三個助手的底層對話流
        async function runGeminiFlow() {
            if(!GEMINI_API_KEY) { alert("請先設定金鑰！"); promptForApiKey(); return; }
            const xiuInput = inputArea.value;
            if(!xiuInput) { alert("請先輸入靈感或看法！"); return; }

            statusBox.style.display = "block";
            statusBox.innerHTML = `⏳ <b>[三智慧體連線中]</b> 正在調動核心默契指紋，發動聯動審查協定...`;

            // 🎯 將底層默契與文章模板固化為 Prompt 指令，最大程度防止記憶錯亂
            const systemInstruction = `
            你現在是 24hr-168.com 數位診斷室網站的後台多智慧體協同系統。你必須同時扮演三個角色：
            1. 助手 A (硬核續寫員)：將岫老師的看法擴寫成超過 1500 字的扎實內容。口吻必須一本正經、犀利、扒光底細、專治不服。
            2. 網頁放樣師：在正文開頭，自動用 HTML 和純 CSS 刻出一個「結構化摘要對比圖卡 (.infographic-box)」，嚴禁使用任何外部圖片檔案。
            3. 助手 B (審閱官)：嚴格執行繁簡錯別字校正、確保使用台灣專業名詞（如：網域、放樣、退縮尺寸、個資），並將中文版與高級英文版以 1:1 絲滑串接，首尾返回 index.html 的連結必須安全閉合。
            
            輸出格式規範：一律只返回 24hr-168.com 文章內部的 HTML 代碼（包含頂部返回連結、.infographic-box、正文、.english-section、以及頁腳的大深藍色返回按鈕）。不要返回 Markdown 的 \`\`\`html 標籤。
            `;

            try {
                // 直連 Google 官方最新 Gemini 大腦接口
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [
                            { role: "user", parts: [{ text: systemInstruction + "\n\n岫老師的原始素材與核心看法如下：\n" + xiuInput }] }
                        ],
                        generationConfig: { maxOutputTokens: 8192, temperature: 0.3 }
                    })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let finalHtml = data.candidates[0].content.parts[0].text;
                    // 清理可能夾帶的 markdown 殘留
                    finalHtml = finalHtml.replace(/```html/g, "").replace(/```/g, "").trim();
                    
                    outputArea.value = finalHtml;
                    statusBox.innerHTML = `🟢 <b>雙重審查通過！</b> 1500字中英成文與純網頁圖卡放樣完畢，請一鍵複製發布！`;
                } else {
                    throw new Error("大腦未返回正確數據，請檢查金鑰權限或輸入內容。");
                }
            } catch (error) {
                statusBox.innerHTML = `<span style="color:#e74c3c;">❌ <b>連線崩塌：</b> ${error.message}。請確認您的網路狀況，或點擊右上角重設金鑰。</span>`;
            }
        }

        function copyCode() { outputArea.select(); document.execCommand('copy'); alert('📋 最終 HTML 代碼複製成功！請直接去 GitHub 貼上發布。'); }
    </script>
</body>
</html>
